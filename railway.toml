[build]
builder = "nixpacks"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[[services]]
name = "bot"

[services.variables]
# Set these in your Railway environment:
# DISCORD_BOT_TOKEN
# DISCORD_CLIENT_ID
# SUPABASE_URL          (optional - enables cloud persistence)
# SUPABASE_SERVICE_ROLE_KEY (optional)
