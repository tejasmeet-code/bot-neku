providers = ["node"]

[variables]
NODE_VERSION = "20"
NPM_CONFIG_PRODUCTION = "false"
PNPM_VERSION = "9"

[phases.setup]
nixPkgs = ["nodejs_20", "pnpm-9_x"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
